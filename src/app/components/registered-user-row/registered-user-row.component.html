<td>{{ user.name }}</td>
<td>{{ user.username }}</td>
<td class="table-actions-cell">
  <div class="table-actions">
    <button type="button" class="table-btn table-btn-edit" (click)="edit.emit(index)">
      {{ isEditing ? 'Editing' : 'Edit' }}
    </button>
    <button type="button" class="table-btn table-btn-delete" (click)="delete.emit(index)">Delete</button>
  </div>
</td>
